<!DOCTYPE html>
<html lang="id">
<head>

    <title>Profil Pribadi</title>

    <!-- CSS MURNI -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 119, 182, 0.15);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #0077B6 0%, #52B788 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.6);
            overflow: hidden;
            margin: 0 auto 15px;
            background: rgba(255, 255, 255, 0.2);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-header h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-header p {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 300;
        }

        .card-body {
            padding: 25px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-biru {
            background-color: rgba(0, 119, 182, 0.1);
            color: #0077B6;
        }

        .icon-hijau {
            background-color: rgba(45, 106, 79, 0.1);
            color: #2D6A4F;
        }

        .icon-laut {
            background-color: rgba(0, 180, 216, 0.1);
            color: #00B4D8;
        }

        .icon-daun {
            background-color: rgba(82, 183, 136, 0.1);
            color: #52B788;
        }

        .info-text .label {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 3px;
        }

        .info-text .value {
            font-size: 15px;
            color: #374151;
            font-weight: 600;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #e5e7eb, transparent);
            margin: 20px 0;
        }

        .social-section {
            text-align: center;
        }

        .social-title {
            font-size: 14px;
            color: #6b7280;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <div class="avatar">

                <img src="sasuke.jpg" alt="Foto Profil">

            <h1>Widede Saputra</h1>

        <div class="card-body">

            <div class="info-item">

            </div>

            <div class="info-item">

                    <span class="label">Cita-cita</span>

            </div>

            <div class="divider"></div>

            <div class="social-section">
                <h3 class="social-title">Hubungi Saya</h3>
                <div class="social-links">
                    <a href="widede23" class="social-link icon-biru" style="color:#0077B6">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="087723051549" class="social-link icon-hijau" style="color:#2D6A4F">

                    <a href="#" class="social-link icon-laut" style="color:#00B4D8">
                        <i class="fa-brands fa-github"></i>
                    </a>
                    <a href="#" class="social-link icon-daun" style="color:#52B788">
                        <i class="fa-solid fa-envelope"></i>
                    </a>
                </div>
            </div>

        </div>
    </div>

</body>
