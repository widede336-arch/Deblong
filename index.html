<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pribadi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        // Konfigurasi warna custom
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ocean: '#0077B6',
                        wave: '#00B4D8',
                        leaf: '#52B788',
                        mint: '#95D5B2',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-gradient {
                background: linear-gradient(135deg, #0077B6 0%, #52B788 100%);
            }
            .text-gradient {
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-image: linear-gradient(to right, #0077B6, #52B788);
            }
            .shadow-custom {
                box-shadow: 0 10px 30px rgba(0, 119, 182, 0.2);
            }
        }
    </style>
    <!-- Import Font Poppins agar terlihat modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans flex items-center justify-center min-h-screen p-4">

    <!-- Container Utama -->
    <div class="w-full max-w-md">
        
        <!-- Kartu Profil -->
        <div class="bg-white rounded-3xl shadow-custom overflow-hidden transition-all duration-300 hover:shadow-xl">
            
            <!-- Header dengan Gradasi Warna Laut & Pantai -->
            <div class="card-gradient p-8 text-center relative">
                <!-- Foto Profil -->
                <div class="w-32 h-32 mx-auto rounded-full border-4 border-white/50 overflow-hidden bg-white/20 backdrop-blur-sm mb-4">
                    <!-- Ganti URL di bawah ini dengan foto kamu sendiri -->
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Foto Profil" class="w-full h-full object-cover">
                </div>
                <h1 class="text-[clamp(1.5rem,5vw,2rem)] font-bold text-white">NAMA LENGKAP</h1>
                <p class="text-blue-100 font-light">Pelajar | Siswa</p>
            </div>

            <!-- Isi Konten -->
            <div class="p-6 space-y-5">
                
                <!-- Data Diri -->
                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-ocean/10 flex items-center justify-center text-ocean">
                            <i class="fa fa-graduation-cap"></i>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 uppercase tracking-wider">Kelas</p>
                            <p class="font-semibold text-gray-700">XII TKJ 2</p> <!-- Ganti dengan kelasmu -->
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-leaf/10 flex items-center justify-center text-leaf">
                            <i class="fa fa-building"></i>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 uppercase tracking-wider">Sekolah</p>
                            <p class="font-semibold text-gray-700">SMAN 1 Semarang</p> <!-- Ganti dengan sekolahmu -->
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-wave/10 flex items-center justify-center text-wave">
                            <i class="fa fa-heart"></i>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 uppercase tracking-wider">Hobi</p>
                            <p class="font-semibold text-gray-700">Coding, Bermain Game, Berenang</p> <!-- Ganti hobi -->
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-mint/10 flex items-center justify-center text-leaf">
                            <i class="fa fa-briefcase"></i>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 uppercase tracking-wider">Cita-cita</p>
                            <p class="font-semibold text-gray-700">Web Developer & Desainer</p> <!-- Ganti cita-cita -->
                        </div>
                    </div>
                </div>

                <!-- Garis Pemisah -->
                <div class="h-px bg-gradient-to-r from-transparent via-gray-200 to-transparent my-2"></div>

                <!-- Media Sosial -->
                <div class="text-center">
                    <h3 class="text-sm font-semibold text-gray-500 mb-4">Hubungi Saya</h3>
                    <div class="flex justify-center gap-4">
                        <a href="#" class="w-11 h-11 rounded-full bg-ocean/10 text-ocean flex items-center justify-center hover:bg-ocean hover:text-white transition-all duration-300">
                            <i class="fa fa-instagram"></i>
                        </a>
                        <a href="#" class="w-11 h-11 rounded-full bg-wave/10 text-wave flex items-center justify-center hover:bg-wave hover:text-white transition-all duration-300">
                            <i class="fa fa-whatsapp"></i>
                        </a>
                        <a href="#" class="w-11 h-11 rounded-full bg-leaf/10 text-leaf flex items-center justify-center hover:bg-leaf hover:text-white transition-all duration-300">
                            <i class="fa fa-github"></i>
                        </a>
                        <a href="#" class="w-11 h-11 rounded-full bg-mint/10 text-mint-600 flex items-center justify-center hover:bg-mint hover:text-white transition-all duration-300">
                            <i class="fa fa-envelope"></i>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
